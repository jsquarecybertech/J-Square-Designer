[build]
  command = "npm run build"
  # The publish directory is automatically handled by the Netlify Next.js Runtime, 
  # but setting it explicitly is a good fallback.
  publish = ".next"

[build.environment]
  # Next.js 14+ and React 19 recommend Node 20+
  NODE_VERSION = "20"

# Cache the Next.js cache directory to significantly speed up subsequent builds
[[cache]]
  paths = [
    ".next/cache",
    "node_modules"
  ]

# Set security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Caching for static assets (fonts, images) in the public folder
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
